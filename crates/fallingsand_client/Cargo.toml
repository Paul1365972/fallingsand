[package]
name = "fallingsand_client"
version.workspace = true
edition.workspace = true

[[bin]]
name = "fallingsand"
path = "src/main.rs"

[features]
dev = ["bevy/dynamic_linking", "bevy/dev"]

[build-dependencies]
embed-resource = "3"

[dependencies]
fallingsand_core = { workspace = true }
fallingsand_sim = { workspace = true }
fallingsand_protocol = { workspace = true }
fallingsand_net = { workspace = true }
bevy = { workspace = true, features = ["2d", "ui"] }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
fallingsand_server = { workspace = true }
fallingsand_sim = { workspace = true, features = ["parallel"] }

[target.'cfg(all(target_family = "wasm", target_os = "unknown"))'.dependencies]
bevy = { workspace = true, features = ["2d", "ui", "web"] }
getrandom = { version = "0.3", features = ["wasm_js"] }
