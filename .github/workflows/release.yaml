name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Verify tag matches workspace version
        run: |
          crate_version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "fallingsand_client") | .version')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$crate_version" != "$tag_version" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match workspace version ${crate_version}"
            exit 1
          fi

  build-release:
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            client-bin: fallingsand
            server-bin: fallingsand_server
          - os: windows-latest
            platform: windows
            arch: x86_64
            client-bin: fallingsand.exe
            server-bin: fallingsand_server.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - name: Install Bevy dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libasound2-dev libudev-dev libwayland-dev

      - name: Build client and server
        run: cargo build --profile dist --locked -p fallingsand_client -p fallingsand_server

      - name: Package archives
        if: matrix.platform == 'linux'
        run: |
          mkdir -p dist stage/client stage/server
          cp "target/dist/${{ matrix.client-bin }}" stage/client/
          cp -r assets stage/client/
          cp "target/dist/${{ matrix.server-bin }}" .env.template stage/server/
          tar -czf "dist/fallingsand-client-${GITHUB_REF_NAME}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" \
            -C stage/client "${{ matrix.client-bin }}" assets
          tar -czf "dist/fallingsand-server-${GITHUB_REF_NAME}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" \
            -C stage/server "${{ matrix.server-bin }}" .env.template

      - name: Package archives
        if: matrix.platform == 'windows'
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "target/dist/${{ matrix.client-bin }}", assets -DestinationPath "dist/fallingsand-client-$env:GITHUB_REF_NAME-${{ matrix.platform }}-${{ matrix.arch }}.zip"
          Compress-Archive -Path "target/dist/${{ matrix.server-bin }}", ".env.template" -DestinationPath "dist/fallingsand-server-$env:GITHUB_REF_NAME-${{ matrix.platform }}-${{ matrix.arch }}.zip"

      - name: Upload archives
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download archives
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
