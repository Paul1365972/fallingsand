name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_DEV_DEBUG: 0

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Format
        run: cargo fmt --all --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Bevy dependencies
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libasound2-dev libudev-dev libwayland-dev

      - name: Lint
        run: cargo clippy --workspace --all-targets --locked

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Bevy dependencies
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libasound2-dev libudev-dev libwayland-dev

      - name: Test
        run: cargo test --workspace --locked

  build-native:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Bevy dependencies
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libasound2-dev libudev-dev libwayland-dev

      - name: Build client and server
        run: cargo build --release --locked -p fallingsand_client -p fallingsand_server

      - name: Upload client
        uses: actions/upload-artifact@v4
        with:
          name: fallingsand-client-linux
          path: target/release/fallingsand
          if-no-files-found: error

      - name: Upload server
        uses: actions/upload-artifact@v4
        with:
          name: fallingsand-server-linux
          path: target/release/fallingsand_server
          if-no-files-found: error

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Bevy CLI
        run: cargo binstall --version 0.1.0-alpha.2 --locked --no-confirm --force --git=https://github.com/TheBevyFlock/bevy_cli bevy_cli

      - name: Build web bundle
        run: bevy build --locked --release -p fallingsand_client --yes web --bundle

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/bevy_web/web-release/fallingsand

  deploy-web:
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
